name: incident-studio-soak

on:
  schedule:
    - cron: '30 2 * * *'
  workflow_dispatch:

concurrency:
  group: incident-studio-soak-${{ github.ref }}
  cancel-in-progress: false

jobs:
  incident-studio-soak:
    name: Incident Studio soak suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile extension
        run: npm run compile

      - name: Execute stress soak loops (10 passes)
        run: |
          set -euo pipefail
          for i in $(seq 1 10); do
            echo "[nightly-soak] pass ${i}/10"
            npm run test:stress:incident-studio
          done
